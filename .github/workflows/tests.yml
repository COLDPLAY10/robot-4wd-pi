name: tests

# Юнит-тесты гоняются БЕЗ железа и БЕЗ ONNX-моделей на синтетических данных:
#   - test_floor_fusion       — контракт слияния пол(seg)+глубина (нужны numpy+cv2);
#   - test_lidar_freshness     — продюсерская свежесть лидара, фикс A2 (serial
#                                стабится в самом тесте, pyserial не нужен);
#   - test_navigation_guards   — логика защитных веток навигации, фиксы A4/A5
#                                (чистый Python);
#   - test_seg_pairing          — контракт когерентной пары _SegWorker, фикс B5
#                                (реальный класс, Raspbot_Lib/serial стабятся).
# Raspbot_Lib / onnxruntime / модели на runner НЕ нужны.

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        # headless-сборка opencv: на runner нет дисплея/libGL.
        run: pip install numpy opencv-python-headless
      - name: Run unit tests
        # Каждый файл — самостоятельный раннер (sys.exit(1) при падении),
        # поэтому набор прогоняем явно и валим job на первой же ошибке.
        run: |
          python3 tests/test_floor_fusion.py
          python3 tests/test_lidar_freshness.py
          python3 tests/test_navigation_guards.py
          python3 tests/test_seg_pairing.py
